# The environment for web crawler development in Python version.
name: spider_env

channels:
  - conda-forge
  - nodefaults

dependencies:
  - python=3.13
  - pip
  - pip:
# utils
    - notebook
    - pathlib
    - pandas

# main
# framework
    - Scrapy  # In conda, the name is scrapy.
    - playwright
#    - selenium
# net
    - requests
    - httpx
    - aiohttp
# paser
    - beautifulsoup4
# proxy
    - proxy-pool
# task manager
    - celery
    - tenacity
    - rq  # lightweight


