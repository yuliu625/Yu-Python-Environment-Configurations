[project]
name = "dl-project"
version = "0.1.0"
description = "Base deep learning project."
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    # ==== Base ====
    ## utils
    "notebook",
    "ipywidgets",
    ## log
    "loguru",
    ## path
    "pathlib",
    "omegaconf",
    ## tests
    "pytest",

    # ==== main ====
    ## ==== torch related ====
    "torch",
#    "torchvision",
#    "torchaudio",

